run-name: Jackdaw deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  run_checks:
    uses: ./.github/workflows/run_checks.yaml
  deploy:
    needs: run_checks
    runs-on: ubuntu-latest
    environment: clojars_deploy
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: set up Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      # Releases are unsigned (Clojars does not require signing); deploy with a
      # Clojars deploy token stored in the repo's CLOJARS_USERNAME/CLOJARS_PASSWORD secrets.
      - name: deploy
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: lein deploy clojars
