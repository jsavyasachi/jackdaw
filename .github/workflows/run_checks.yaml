run-name: Run checks

on:
  workflow_call:

jobs:
  RunChecks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['17', '21']
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # do not fetch tags if the trigger event is a tag push
          fetch-tags: ${{ startsWith(github.ref, 'refs/tags') != true }}
          fetch-depth: 100

      - name: set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: set up Leiningen
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08 # 13.4
        with:
          lein: 2.12.0

      - name: cache ~/.m2
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('project.clj') }}
          restore-keys: ${{ runner.os }}-m2-

      # Single-node KRaft Kafka + schema-registry + kafka-rest (no ZooKeeper).
      - name: start kafka stack
        run: docker compose up -d --wait

      - name: test
        run: lein test
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost
          SCHEMA_REGISTRY_HOST: localhost
          KAFKA_REST_PROXY_HOST: localhost

      - name: lint
        run: lein clj-kondo --lint src test || true

      - name: stop kafka stack
        if: always()
        run: docker compose down -v || true
