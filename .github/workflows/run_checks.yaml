run-name: Run checks

on:
  workflow_call:

jobs:
  RunChecks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['17', '21']
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # do not fetch tags if the trigger event is a tag push
          fetch-tags: ${{ startsWith(github.ref, 'refs/tags') != true }}
          fetch-depth: 100

      - name: set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: set up Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0

      - name: cache ~/.m2
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('project.clj') }}
          restore-keys: ${{ runner.os }}-m2-

      # Single-node KRaft Kafka + schema-registry + kafka-rest (no ZooKeeper).
      - name: start kafka stack
        run: docker compose up -d --wait

      - name: test
        run: lein test
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost
          SCHEMA_REGISTRY_HOST: localhost
          KAFKA_REST_PROXY_HOST: localhost

      - name: lint
        run: lein clj-kondo --lint src test || true

      - name: stop kafka stack
        if: always()
        run: docker compose down -v || true
